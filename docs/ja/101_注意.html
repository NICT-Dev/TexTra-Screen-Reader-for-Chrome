<div class="title">注意</div>
<p><br>
&nbsp;OCR機能はWindowsの機能を利用しています。<br>
&nbsp;これらの機能がうまく行かない場合はMicrosoftにお問い合わせください。<br><br>

<hr align="left" width="80%" >
&nbsp;OCRとは、画像内の文字列を文字データとして取得する機能です。<br>
&nbsp;フォントによってはうまく読み取れない場合があります。<br><br>

<hr align="left" width="80%">
&nbsp;文字が小さい場合、OCRが読み取りを失敗することがあります。<br>
&nbsp;表示サイズを大きくして、再度お試しください。<br>
</p>
