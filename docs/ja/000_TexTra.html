    <div class="title">TexTra Screen Reader for Chrome</div>
<p><br>

TexTra Screen Reader for Chromeは<br>
ブラウザアプリChromeの拡張「TexTra 
Chrome」に、<br>
Windows上のテキストをOCRで取得する機能を追加するアプリケーションです。<br>
<br>
PDFなどからテキストをOCRでChromeへ取り込んで翻訳。<br>
<img alt="" src="images/image005.png" width="603" height="506"><br>


<br>
※&nbsp;&nbsp;OCR機能はWindowsのAPIを利用しています。<br>

※&nbsp;&nbsp;特殊なフォントを使用している場合、文字の読み取りが失敗する場合があります。<br>
</p>
