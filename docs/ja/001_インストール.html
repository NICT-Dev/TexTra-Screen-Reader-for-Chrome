<div class="title">インストール</div><br>&nbsp;・&nbsp;インストール<br>&nbsp;&nbsp;msiファイルをダウンロードして、実行してください。<br><br>
&nbsp;&nbsp;インストール後、<br>
&nbsp;&nbsp;デスクトップにできたショートカットからアプリを１度実行してください。<br>&nbsp;&nbsp;このアプリをChromeから呼び出すための設定を行います。<br>
&nbsp;&nbsp;<img alt="" src="images/image007.png" width="222" height="133"><br>

<br>
&nbsp;・&nbsp;アンインストール<br>
&nbsp;&nbsp;スタートメニューでアプリのアイコンを右クリックして、<br>
&nbsp;&nbsp;表示されたメニューからアンインストールを選択してください。&nbsp;&nbsp; 
<br>
<br>
<img alt="" src="images/image010.png"><br>
<br>
<br>
&nbsp;必要環境&nbsp;<br>
&nbsp;&nbsp;64ビット版 Windows 10 または Windows 11&nbsp; 
<br>&nbsp; TexTra Chrome (ブラウザアプリChrome、Edge用の拡張)
